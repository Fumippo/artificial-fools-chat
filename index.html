<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人工無能チャット v4.8</title>
<style>
:root{
  --bg:#0f1319;--panel:#171d26;--panel2:#212936;--line:#344052;
  --text:#eef3f8;--muted:#98a6b5;--blue:#2e6db5;--green:#2f754b;
  --red:#86384a;--yellow:#8a6a25;--bubble:#252e3b;--user:#164979;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
.app{max-width:1240px;margin:auto;min-height:100vh;display:grid;grid-template-columns:320px 1fr}
aside{background:var(--panel);border-right:1px solid var(--line);padding:16px;overflow:auto}
main{min-width:0;display:flex;flex-direction:column;min-height:100vh}
h1{font-size:22px;margin:0 0 6px}
h2{font-size:14px;margin:0 0 10px}
.small{font-size:12px;color:var(--muted);line-height:1.55}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
button,input,select,textarea{font:inherit;color:var(--text);background:#293341;border:1px solid #3c485a;border-radius:9px}
button{padding:8px 10px;cursor:pointer}
input,select,textarea{width:100%;padding:9px}
textarea{min-height:58px;resize:vertical}
.row{display:flex;gap:8px}
.row>*{flex:1}
.primary{background:var(--blue)}
.green{background:var(--green)}
.red{background:var(--red)}
.yellow{background:var(--yellow)}
.tabs{display:flex;flex-wrap:wrap;border-bottom:1px solid var(--line);background:#151a22}
.tabs button{border:0;border-radius:0;background:transparent;padding:13px 17px}
.tabs button.active{background:#252e3a}
.panel{display:none;flex:1;min-height:0}
.panel.active{display:flex;flex-direction:column}
.chat{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;background:var(--bubble);border:1px solid #394658;border-radius:13px;padding:10px 12px;line-height:1.52}
.msg.user{align-self:flex-end;background:var(--user)}
.meta{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.system{align-self:center;color:var(--muted);font-size:12px;padding:5px 9px;border:1px dashed var(--line);border-radius:999px}
.source{font-size:10px;padding:2px 6px;border-radius:999px;background:#334155;color:#dce6f2}
.source.teach{background:#27563a}
.source.remix{background:#654b21}
.source.echo{background:#6b2f3a}.source.context{background:#29506b}.source.human{background:#4b6530}.source.phrase{background:#6b5329}.source.plazaPhrase{background:#355f55}
.composer{padding:12px;border-top:1px solid var(--line);background:#151a22}
.toolbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.toolbar button{font-size:12px}
.agent{padding:9px 0;border-bottom:1px solid #303947}
.agent:last-child{border-bottom:0}
.agent-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.agent-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.agent-actions button{font-size:11px;padding:5px 7px}
.badge{font-size:11px;padding:2px 6px;border-radius:999px;background:#31415a}
.stat{font-size:11px;color:var(--muted)}
.toggle{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px}
.toggle input{width:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.statsbox{font-size:12px;line-height:1.7;color:var(--muted)}
.table{width:100%;border-collapse:collapse;font-size:12px}
.table th,.table td{border-bottom:1px solid #344052;padding:7px;text-align:left}
.table th{color:#c9d4df}
.warn{color:#ffd27a}
.ok{color:#8ee0a7}
@media(max-width:850px){
 .app{grid-template-columns:1fr}
 aside{border-right:0;border-bottom:1px solid var(--line)}
 main{min-height:72vh}
 .grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<aside>
  <h1>人工無能チャット v4.8</h1>
  <div class="small">語録の突然変異は残し、全員唱和と同文連打だけ抑えます。完全に正常化したら、この企画の存在意義が蒸発します。</div>

    <label>会話優先度 <span id="conversationText">72%</span></label>

    <label>最低関連度 <span id="relevanceText">22%</span></label>

  <div class="card">

  <div class="card">
    <h2>自動会話</h2>
    <div class="row">

  <div class="card">

  <div class="card">
    <h2>データ</h2>

      <button id="exportBtn">書き出し</button>
      <button id="importBtn">読み込み</button>

    <button id="resetAll" class="red" style="width:100%;margin-top:8px">全消去</button>
    <input id="fileInput" type="file" accept=".json" hidden>
  </div>
</aside>

<main>
  <div class="tabs">
    <button class="active" data-tab="personal">個人チャット</button>
    <button data-tab="teach">手動で教える</button>

        <div id="agentStats"></div>

</main>
</div>

<script>
const KEY="artificialFoolsV3";
const VERSION=4;
const COLORS=["#79a7ff","#7bd88f","#d49bff","#ffd36e","#ff8b8b","#70d8d8","#ff9fd2"];

function norm(s){return String(s||"").trim().replace(/\s+/g," ")}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function words(s){return norm(s).split(/[、,\s]+/).filter(Boolean)}
function grams(s,n=2){
  s=norm(s);if(!s)return[];
  if(s.length<n)return[s];
  const a=[];for(let i=0;i<=s.length-n;i++)a.push(s.slice(i,i+n));
  return a;
}
function similarity(a,b){
  const A=new Set(grams(a)),B=new Set(grams(b));let n=0;
  A.forEach(x=>{if(B.has(x))n++});
  return (2*n)/((A.size+B.size)||1);
}
function esc(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function uniq(a){return [...new Set(a)]}


const STOP_WORDS=new Set([
  "これ","それ","あれ","ここ","そこ","あそこ","もの","こと","ため","よう","です","ます",
  "した","して","いる","ある","ない","なに","何","どう","どれ","誰","どこ","いつ",
  "今日","昨日","明日","私","あなた","俺","僕","から","まで","ので","けど","って",
  "について","という","ください","でした","でしょう","ですか","ますか"
]);

function classifyIntent(text){
  const t=norm(text);
  if(!t)return"empty";
  if(/^(こんにちは|こんばんは|おはよう|やあ|どうも|オッス|おっす)/.test(t))return"greeting";
  if(/(ありがとう|ありがと|感謝)/.test(t))return"thanks";
  if(/(ごめん|すみません|すまない|申し訳)/.test(t))return"apology";
  if(/(さようなら|またね|じゃあね|ばいばい)/.test(t))return"farewell";
  if(/(どういう意味|意味は|何の意味|とは何)/.test(t))return"meaning_question";
  if(/(何をして|なにして|どうしてた|何してた)/.test(t))return"activity_question";
  if(/(誰|だれ).*(ですか|なの|だよ|？|\?)/.test(t))return"who_question";
  if(/(どこ|場所).*(ですか|なの|だよ|？|\?)/.test(t))return"where_question";
  if(/(いつ|何時|何日).*(ですか|なの|だよ|？|\?)/.test(t))return"when_question";
  if(/(なぜ|なんで|どうして).*(？|\?|ですか|なの)/.test(t))return"why_question";
  if(/(好き|嫌い).*(？|\?|ですか|なの)/.test(t))return"preference_question";
  if(/(ですか|ますか|なの|かい|？|\?)$/.test(t))return"question";
  if(/^(そう|たしかに|確かに|ですよね|だよね)/.test(t))return"agreement";
  if(/[！!]$/.test(t))return"exclamation";
  return"statement";
}

function extractTopics(text){
  const t=norm(text)
    .replace(/[。、！？!?「」『』（）()【】\[\]…・:：;；]/g," ")
    .replace(/(です|ます|でした|ません|だった|している|していた|ください|でしょう)/g," ");
  const parts=t.split(/\s+/).flatMap(x=>{
    if(x.length<=8)return[x];
    const out=[];
    for(let i=0;i<x.length-2;i+=3)out.push(x.slice(i,i+5));
    return out;
  });
  return uniq(parts.map(x=>x.trim()).filter(x=>x.length>=2&&!STOP_WORDS.has(x))).slice(0,8);
}

function topicOverlap(a,b){
  const A=Array.isArray(a)?a:extractTopics(a);
  const B=Array.isArray(b)?b:extractTopics(b);
  if(!A.length||!B.length)return 0;
  let hit=0;
  A.forEach(x=>{
    if(B.some(y=>x.includes(y)||y.includes(x)||similarity(x,y)>=.55))hit++;
  });
  return hit/Math.max(A.length,B.length);
}

function intentCompatibility(inputIntent,triggerIntent,responseText){
  if(!triggerIntent)return 1;
  if(inputIntent===triggerIntent)return 1.8;

  const responseIntent=classifyIntent(responseText);
  const good={
    greeting:["greeting"],
    thanks:["thanks","agreement","statement"],
    apology:["agreement","statement"],
    farewell:["farewell","greeting"],
    meaning_question:["meaning_question","question","statement"],
    activity_question:["activity_question","statement"],
    who_question:["who_question","statement"],
    where_question:["where_question","statement"],
    when_question:["when_question","statement"],
    why_question:["why_question","statement"],
    preference_question:["preference_question","statement","agreement"],
    question:["question","statement","agreement"],
    agreement:["agreement","statement"],
    exclamation:["exclamation","agreement","statement"],
    statement:["statement","agreement","question"]
  };
  if((good[inputIntent]||[]).includes(responseIntent))return 1.15;

  const hard=["greeting","thanks","apology","farewell","meaning_question","activity_question","who_question","where_question","when_question","why_question"];
  if(hard.includes(inputIntent))return .22;
  return .65;
}


const FALLBACK_POLLUTION_PATTERNS=[
  /について/,/話している/,/話しますか/,/聞かせて/,/詳しく言って/,
  /どうなりました/,/意味ですか/,/どのこと/,/そういうこと/,
  /それは面白/,/ちょっと意外/,/本当ですか/,/勢いがあります/,
  /びっくりしました/,/どうしてでしょう/,/なるほど/,
  /そうなんですか/,/そうですね/,/どういたしまして/,
  /こちらこそ/,/よくわかりません/,/場所までは/,/時間までは/,
  /理由までは/,/好みが決まっていません/,/広場でみんなの話/,
  /辞書を眺めていました/,/特に何もしていませんでした/,
  /今日は何を話/,/どうしましたか/,/もう少し/,/意外です/
]

function isFallbackPollution(text){
  const t=norm(text);
  return !!t&&FALLBACK_POLLUTION_PATTERNS.some(re=>re.test(t));
}

function isSafeLearningMessage(msg){
  return !!(msg&&msg.text&&msg.source!=="context"&&msg.source!=="fallback"&&!isFallbackPollution(msg.text));
}

function isUsableTopic(topic,text){
  if(!topic||topic.length<2||topic.length>15)return false;
  if(/[！？!?。、…♪↑↓゜∀😂😫]/.test(topic))return false;
  if(/(なるほど|そうなん|うわー|変なの|酷い|悲しい|もうね|入って|よく来た|それじゃあ|こっつ|ぷる|ちりーん|くっしゅ|ぽぺ|クソ|ゴミ|うんち)$/.test(topic))return false;
  if(/(て|で|た|ない|ます|です|する|した|いる|だった|ね|よ)$/.test(topic))return false;
  return /^[一-龥ぁ-んァ-ヶA-Za-z0-9ー・]+$/.test(topic);
}

function conversationFallback(text,agent){
  const intent=classifyIntent(text);
  const topics=extractTopics(text);
  const topic=topics.find(x=>isUsableTopic(x,text))||"";
  const recentFallback=(agent&&agent.fallbackRecent)||[];
  const pickFresh=arr=>{
    const fresh=arr.filter(x=>!recentFallback.includes(x));
    const chosen=rand(fresh.length?fresh:arr);
    if(agent){
      agent.fallbackRecent=agent.fallbackRecent||[];
      agent.fallbackRecent.push(chosen);
      while(agent.fallbackRecent.length>8)agent.fallbackRecent.shift();
    }
    return chosen;
  };
  const choices={
    greeting:[
      "こんにちは。どうしましたか？",
      "こんにちは。",
      "どうも。今日は何を話しますか？"
    ],
    thanks:[
      "どういたしまして。",
      "こちらこそ、ありがとう。",
      "大丈夫です。"
    ],
    apology:[
      "大丈夫です。",
      "気にしないでください。",
      "まあ、しょうがないですね。"
    ],
    farewell:[
      "またね。",
      "さようなら。",
      "また広場で会いましょう。"
    ],
    meaning_question:[
      "意味はまだ説明できません。",
      "わかりません。"
    ],
    activity_question:[
      "広場でみんなの話を聞いていました。",
      "さっきまで辞書を眺めていました。",
      "特に何もしていませんでした。"
    ],
    who_question:[
      "誰のことですか？",
      "その人についてはよく知りません。",
      `${topic}という人のことですか？`
    ],
    where_question:[
      "場所まではわかりません。",
      "どこのことを指していますか？",
      `${topic}の場所ですか？`
    ],
    when_question:[
      "いつなのかはわかりません。",
      "時間までは覚えていません。",
      "もう少し具体的な日時を教えてください。"
    ],
    why_question:[
      "理由まではわかりません。",
      "どうしてでしょうね。",
      topic?`${topic}が関係しているのかもしれません。`:"何か理由があるのかもしれません。"
    ],
    preference_question:[
      topic?`私は${topic}について、まだ好みが決まっていません。`:"まだ好みが決まっていません。",
      "嫌いではありません。",
      "どちらとも言えません。"
    ],
    question:[
      "わかりません。",
      "質問の内容をまだ理解できません。"
    ],
    agreement:[
      "そうですね。",
      "たしかに。",
      "ですよねぇ。"
    ],
    exclamation:[
      "びっくりしました。",
      "そうなんですか！",
      "勢いがありますね。"
    ],
    statement:[
      "そうですか。",
      "へえ。",
      "たしかに。",
      "そうなんですね。"
    ]
  };
  return{ text:pickFresh(choices[intent]||choices.statement),source:"context" };
}

class Agent{
  constructor(name,rate=.5,color=rand(COLORS)){
    this.name=name;this.rate=rate;this.color=color;
    this.pairs={};this.vocab={};this.recent=[];this.personalLog=[];
    this.favWords=[];this.avoidWords=[];this.favBoost=1.8;
    this.dialogueContext=[];
    this.fallbackRecent=[];
    this.phrases=[];
    this.stats={spoken:0,remix:0,echo:0,teach:0,context:0,phrase:0};
  }
  learnText(text){
    if(isFallbackPollution(text))return;
    grams(text).forEach(g=>{
      if(!isFallbackPollution(g))this.vocab[g]=(this.vocab[g]||0)+1;
    });
  }
  learnPhrase(text,kind="human"){
    text=norm(text);
    if(!text||isFallbackPollution(text))return;
    if(text.length>120)return;
    let found=this.phrases.find(x=>x.text===text);
    if(found){
      found.count=Math.min(12,(found.count||1)+1);
      if(kind==="teach")found.kind="teach";
    }else{
      this.phrases.push({
        text,count:kind==="teach"?4:1,used:0,kind,
        topics:extractTopics(text),intent:classifyIntent(text)
      });
    }
    if(this.phrases.length>500){
      this.phrases.sort((a,b)=>(b.count||1)-(a.count||1));
      this.phrases=this.phrases.slice(0,500);
    }
    this.learnText(text);
  }
  phraseReply(input){
    const clean=this.phrases.filter(p=>
      p.text&&!isFallbackPollution(p.text)&&
      !this.recent.includes(p.text)&&
      !state.plazaRecent.includes(p.text)
    );
    if(!clean.length)return null;

    const inTopics=extractTopics(input);
    const inIntent=classifyIntent(input);
    const scored=clean.map(p=>{
      let score=.12+(p.count||1)*.08;
      score+=topicOverlap(inTopics,p.topics||extractTopics(p.text))*1.7;
      if(p.intent===inIntent)score+=.35;
      score*=this.traitMultiplier(p.text);
      return {p,score};
    }).sort((a,b)=>b.score-a.score);

    const pool=scored.slice(0,Math.min(12,scored.length));
    const total=pool.reduce((s,x)=>s+Math.max(.01,x.score),0);
    let r=Math.random()*total;
    for(const x of pool){
      r-=Math.max(.01,x.score);
      if(r<=0){
        x.p.used=(x.p.used||0)+1;
        return {text:x.p.text,source:x.p.kind==="plaza"?"plazaPhrase":"phrase"};
      }
    }
    const p=pool[0].p;
    p.used=(p.used||0)+1;
    return {text:p.text,source:p.kind==="plaza"?"plazaPhrase":"phrase"};
  }
  normalizeCandidate(c){
    if(typeof c==="string")return{text:c,count:1,used:0,kind:"learned",echoPenalty:1,triggerIntent:null,triggerTopics:[]};
    return Object.assign({count:1,used:0,kind:"learned",echoPenalty:1,triggerIntent:null,triggerTopics:[]},c);
  }
  learnPair(input,reply,kind="learned"){
    input=norm(input);reply=norm(reply);if(!input||!reply)return;
    if(kind!=="teach"&&(kind==="context"||isFallbackPollution(input)||isFallbackPollution(reply)))return;
    if(!this.pairs[input])this.pairs[input]=[];
    this.pairs[input]=this.pairs[input].map(x=>this.normalizeCandidate(x));
    let found=this.pairs[input].find(x=>x.text===reply);
    const triggerIntent=classifyIntent(input);
    const triggerTopics=extractTopics(input);
    if(found){
      found.count=Math.min(kind==="teach"?12:6,(found.count||1)+(kind==="teach"?3:1));
      if(kind==="teach")found.kind="teach";
      found.triggerIntent=found.triggerIntent||triggerIntent;
      found.triggerTopics=uniq([...(found.triggerTopics||[]),...triggerTopics]).slice(0,8);
    }else{
      this.pairs[input].push({
        text:reply,count:kind==="teach"?5:1,used:0,kind,echoPenalty:1,
        triggerIntent,triggerTopics
      });
    }
    if(this.pairs[input].length>16){
      this.pairs[input].sort((a,b)=>this.baseScore(b,input)-this.baseScore(a,input));
      this.pairs[input]=this.pairs[input].slice(0,16);
    }
    this.learnText(input);this.learnText(reply);
  }
  familiarity(text){
    const g=grams(text);if(!g.length)return 0;
    return g.filter(x=>this.vocab[x]).length/g.length;
  }
  shouldReply(text){
    return Math.random()<Math.min(.92,this.rate*(.32+1.35*this.familiarity(text)));
  }
  traitMultiplier(text){
    let m=1;
    const t=norm(text);
    if(this.favWords.some(w=>w&&t.includes(w)))m*=this.favBoost||1.8;
    if(this.avoidWords.some(w=>w&&t.includes(w)))m*=.35;
    return m;
  }
  plazaPenalty(text){
    const idx=state.plazaRecent.lastIndexOf(text);
    if(idx<0)return 1;
    const distance=state.plazaRecent.length-idx;
    return Math.max(.02,distance/(state.settings.plazaRecentLimit+2));
  }
  rememberContext(input,reply=""){
    this.dialogueContext.push({
      input:norm(input),reply:norm(reply),
      intent:classifyIntent(input),topics:extractTopics(input)
    });
    while(this.dialogueContext.length>(state.settings.contextLimit||4))this.dialogueContext.shift();
  }
  contextTopics(){
    return uniq(this.dialogueContext.flatMap(x=>x.topics||[])).slice(-12);
  }
  relevanceScore(c,input=""){
    c=this.normalizeCandidate(c);
    const currentIntent=classifyIntent(input);
    const intentScore=intentCompatibility(currentIntent,c.triggerIntent,c.text);
    const directTopics=extractTopics(input);
    const directOverlap=topicOverlap(directTopics,c.triggerTopics||[]);
    const contextOverlap=topicOverlap(this.contextTopics(),c.triggerTopics||[]);
    const lexical=similarity(input,c.text);
    return Math.min(1,
      .42*Math.min(1,intentScore/1.8)+
      .30*directOverlap+
      .18*contextOverlap+
      .10*lexical
    );
  }
  baseScore(c,input=""){
    c=this.normalizeCandidate(c);
    let score=(c.count||1)/(1+(c.used||0)*.65);
    if(c.kind==="teach")score*=2.8;
    if(c.kind==="human")score*=2.6;
    if(c.kind==="context")score*=.28;
    score*=this.traitMultiplier(c.text);
    score*=c.echoPenalty||1;

    const strength=Number(state.settings.conversationStrength||.72);
    const relevance=this.relevanceScore(c,input);
    score*=Math.max(.08,(1-strength)+strength*(.25+2.15*relevance));

    const intentMult=intentCompatibility(classifyIntent(input),c.triggerIntent,c.text);
    score*=Math.pow(intentMult,Math.max(.2,strength));

    const ri=this.recent.lastIndexOf(c.text);
    if(ri>=0){
      const d=this.recent.length-ri;
      score*=Math.max(.03,d/(state.settings.recentLimit+2));
    }
    score*=this.plazaPenalty(c.text);

    const echo=similarity(input,c.text);
    if(echo>=.94){
      score*=Math.max(.01,1-state.settings.echoPenalty);
    }
    return score;
  }
  chooseWeighted(candidates,input=""){
    if(!candidates.length)return null;
    let pool=candidates.map(x=>this.normalizeCandidate(x))
      .filter(c=>c.text&&c.kind!=="context"&&!isFallbackPollution(c.text));
    if(state.settings.avoidExact){
      const fresh=pool.filter(c=>!this.recent.includes(c.text));
      if(fresh.length)pool=fresh;
    }
    if(state.settings.blockChorus){
      const fresh=pool.filter(c=>!state.plazaRecent.includes(c.text));
      if(fresh.length)pool=fresh;
    }

    const minRel=Number(state.settings.minRelevance||.22);
    const relevant=pool.filter(c=>this.relevanceScore(c,input)>=minRel||c.kind==="teach");
    if(relevant.length)pool=relevant;
    else if(minRel>=.25)return null;

    const weights=pool.map(c=>Math.max(.005,this.baseScore(c,input)));
    let r=Math.random()*weights.reduce((a,b)=>a+b,0);
    for(let i=0;i<pool.length;i++){
      r-=weights[i];
      if(r<=0){
        pool[i].used=(pool[i].used||0)+1;
        return{ text:pool[i].text, source:pool[i].kind||"learned" };
      }
    }
    return{text:pool[pool.length-1].text,source:pool[pool.length-1].kind||"learned"};
  }
  exactReply(text){
    const key=norm(text);
    if(isFallbackPollution(key))return null;
    const arr=(this.pairs[key]||[]).map(x=>this.normalizeCandidate(x));
    return this.chooseWeighted(arr,text);
  }
  similarReply(text){
    const found=Object.keys(this.pairs)
      .filter(k=>!isFallbackPollution(k))
      .map(k=>({score:similarity(text,k),key:k}))
      .filter(x=>x.score>=.34)
      .sort((a,b)=>b.score-a.score)
      .slice(0,7);
    if(!found.length)return null;
    let all=[];
    found.forEach(f=>{
      this.pairs[f.key].map(x=>this.normalizeCandidate(x))
        .filter(c=>c.kind!=="context"&&!isFallbackPollution(c.text))
        .forEach(c=>{
          all.push(Object.assign({},c,{count:(c.count||1)*f.score}));
        });
    });
    return this.chooseWeighted(all,text);
  }
  remix(){
    const corpus=uniq([
      ...Object.values(this.pairs).flat()
        .map(x=>this.normalizeCandidate(x))
        .filter(c=>c.kind!=="context"&&!isFallbackPollution(c.text))
        .map(c=>c.text),
      ...(this.phrases||[]).map(x=>x.text).filter(x=>!isFallbackPollution(x))
    ]).filter(x=>x.length>=4&&!state.plazaRecent.includes(x));
    if(corpus.length<4)return null;
    for(let tries=0;tries<12;tries++){
      const a=rand(corpus),b=rand(corpus);if(a===b)continue;
      const cutA=Math.max(1,Math.floor(a.length*(.30+Math.random()*.35)));
      const cutB=Math.min(b.length-1,Math.floor(b.length*(.30+Math.random()*.35)));
      const made=norm(a.slice(0,cutA)+b.slice(cutB));
      if(made.length>=3&&made.length<=80&&!this.recent.includes(made)&&!state.plazaRecent.includes(made)&&made!==a&&made!==b){
        return{text:made,source:"remix"};
      }
    }
    return null;
  }
  remember(text){
    this.recent.push(text);
    while(this.recent.length>state.settings.recentLimit)this.recent.shift();
  }
  reply(text){
    const inputIntent=classifyIntent(text);
    let out=this.exactReply(text);

    if(!out&&Math.random()<(.45+.45*state.settings.conversationStrength)){
      out=this.similarReply(text);
    }

    if(out&&this.relevanceScore({
      text:out.text,
      triggerIntent:inputIntent,
      triggerTopics:extractTopics(text)
    },text)<Number(state.settings.minRelevance||.22)){
      out=null;
    }

    if(!out&&this.phrases.length&&Math.random()<.82){
      out=this.phraseReply(text);
    }

    const allowRemix=!["greeting","thanks","apology","farewell","meaning_question","activity_question","who_question","where_question","when_question","why_question"].includes(inputIntent);
    if(!out&&allowRemix&&Math.random()<state.settings.remixRate){
      out=this.remix();
    }

    // 会話補完・固定相づち・オウム返しは生成しない。
    if(!out)return null;

    if(state.settings.blockChorus&&state.plazaRecent.includes(out.text)){
      const alt=this.similarReply(text)||this.phraseReply(text)||this.remix();
      if(alt&&!state.plazaRecent.includes(alt.text))out=alt;
      else return null;
    }

    this.remember(out.text);
    this.rememberContext(text,out.text);
    this.stats.spoken=(this.stats.spoken||0)+1;
    if(out.source==="remix")this.stats.remix=(this.stats.remix||0)+1;
    if(out.source==="echo")this.stats.echo=(this.stats.echo||0)+1;
    if(out.source==="teach")this.stats.teach=(this.stats.teach||0)+1;
    if(out.source==="phrase"||out.source==="plazaPhrase")this.stats.phrase=(this.stats.phrase||0)+1;
    return out;
  }
  distinctCount(){
    return uniq([
      ...Object.values(this.pairs).flat().map(x=>this.normalizeCandidate(x).text),
      ...(this.phrases||[]).map(x=>x.text)
    ]).length;
  }
}


function inheritDictionaryTo(target,amount=.70){
  const sources=state.agents.filter(a=>a!==target);
  if(!sources.length)return {inputs:0,replies:0};

  const merged={};
  const vocab={};
  const inheritedPhrases={};

  sources.forEach(a=>{
    Object.entries(a.pairs||{}).forEach(([input,arr])=>{
      if(!merged[input])merged[input]=[];
      (arr||[]).forEach(raw=>{
        const c=a.normalizeCandidate(raw);
        if(c.kind==="context"||isFallbackPollution(input)||isFallbackPollution(c.text))return;
        const key=c.text;
        const found=merged[input].find(x=>x.text===key);
        if(found){
          found.count=Math.min(8,(found.count||1)+(c.count||1)*.35);
        }else{
          merged[input].push({
            text:c.text,
            count:Math.max(.5,(c.count||1)*.65),
            used:0,
            kind:c.kind==="teach"?"learned":c.kind,
            echoPenalty:c.echoPenalty||1,
            triggerIntent:c.triggerIntent||classifyIntent(input),
            triggerTopics:Array.isArray(c.triggerTopics)?c.triggerTopics:extractTopics(input),
            inherited:true
          });
        }
      });
    });

    Object.entries(a.vocab||{}).forEach(([word,count])=>{
      vocab[word]=(vocab[word]||0)+Number(count||0);
    });
    (a.phrases||[]).forEach(p=>{
      if(!p.text||isFallbackPollution(p.text))return;
      inheritedPhrases[p.text]=(inheritedPhrases[p.text]||0)+(p.count||1);
    });
  });

  const allInputs=Object.keys(merged);
  const keepCount=Math.max(1,Math.round(allInputs.length*Math.max(.1,Math.min(1,amount))));
  allInputs.sort((a,b)=>{
    const sa=merged[a].reduce((s,c)=>s+(c.count||1),0);
    const sb=merged[b].reduce((s,c)=>s+(c.count||1),0);
    return sb-sa;
  });

  const selected=new Set(allInputs.slice(0,keepCount));
  let replyCount=0;
  selected.forEach(input=>{
    const candidates=merged[input]
      .sort((a,b)=>(b.count||1)-(a.count||1))
      .slice(0,8);
    target.pairs[input]=candidates;
    replyCount+=candidates.length;
  });

  Object.entries(vocab).forEach(([word,count])=>{
    target.vocab[word]=Math.max(1,Math.round(count/sources.length));
  });

  Object.entries(inheritedPhrases)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,Math.max(20,Math.round(Object.keys(inheritedPhrases).length*amount)))
    .forEach(([text,count])=>{
      target.learnPhrase(text,"inherited");
      const p=target.phrases.find(x=>x.text===text);
      if(p)p.count=Math.max(1,Math.round(count/sources.length));
    });

  return {inputs:selected.size,replies:replyCount};
}

let state;

function migrateAgent(o){
  const a=Object.assign(new Agent(o.name,o.rate,o.color),o);
  a.favWords=Array.isArray(o.favWords)?o.favWords:[];
  a.avoidWords=Array.isArray(o.avoidWords)?o.avoidWords:[];
  a.favBoost=Number(o.favBoost||1.8);
  a.stats=Object.assign({spoken:0,remix:0,echo:0,teach:0,context:0,phrase:0},o.stats||{});
  a.recent=Array.isArray(o.recent)?o.recent:[];
  a.dialogueContext=Array.isArray(o.dialogueContext)?o.dialogueContext:[];
  a.fallbackRecent=Array.isArray(o.fallbackRecent)?o.fallbackRecent:[];
  a.phrases=Array.isArray(o.phrases)?o.phrases.map(p=>
    typeof p==="string"?{text:p,count:1,used:0,kind:"human",topics:extractTopics(p),intent:classifyIntent(p)}:p
  ):[];
  a.personalLog=Array.isArray(o.personalLog)?o.personalLog:[];
  for(const k of Object.keys(a.pairs||{})){
    a.pairs[k]=(a.pairs[k]||[]).map(x=>a.normalizeCandidate(x));
  }
  return a;
}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(!raw){state=defaults();return}
    const x=JSON.parse(raw);
    state=x;
    state.version=VERSION;
    state.agents=(x.agents||[]).map(migrateAgent);
    state.settings=Object.assign(defaults().settings,x.settings||{});
    state.plazaLog=Array.isArray(x.plazaLog)?x.plazaLog:[];
    state.plazaRecent=Array.isArray(x.plazaRecent)?x.plazaRecent:
      state.plazaLog.filter(m=>m.who!=="system").slice(-18).map(m=>m.text);
    if(!state.agents.length)state=defaults();
  }catch(e){state=defaults()}
}

function renderStats(){
  const allPhrases=state.plazaLog.filter(m=>m.who!=="system"&&m.who!=="あなた").map(m=>m.text);
  const counts={};allPhrases.forEach(x=>counts[x]=(counts[x]||0)+1);
  const distinct=Object.keys(counts).length;
  const total=allPhrases.length;
  const max=Math.max(0,...Object.values(counts));
  const dominance=total?max/total:0;
  const echoPairs=state.agents.reduce((s,a)=>s+Object.entries(a.pairs).reduce((q,[input,arr])=>
    q+arr.map(x=>a.normalizeCandidate(x)).filter(c=>similarity(input,c.text)>=.94).length,0),0);

  document.getElementById("globalStats").innerHTML=`
    <b>全体</b><br>
    個体数: ${state.agents.length}<br>
    広場発言数: ${total}<br>
    異なる語録: ${distinct}<br>
    最大語録占有率: ${(dominance*100).toFixed(1)}%<br>
    広場直近記憶: ${state.plazaRecent.length}/${state.settings.plazaRecentLimit}
  `;
  document.getElementById("healthStats").innerHTML=`
    <b>健康診断</b><br>
    オウム返し候補: ${echoPairs}<br>
    状態: <span class="${dominance>.25?'warn':'ok'}">${dominance>.25?'語録独裁の疑い':'多様性は概ね良好'}</span><br>
    唱和防止: ${state.settings.blockChorus?'ON':'OFF'}<br>
    広場学習: ${state.settings.plazaLearn?'ON':'OFF'}
  `;

  let table='<table class="table"><tr><th>個体</th><th>会話入力</th><th>返答候補</th><th>単語記憶数</th><th>発言</th><th>切り貼り</th><th>記憶使用</th></tr>';
  state.agents.forEach(a=>{
    const inputCount=Object.keys(a.pairs||{}).length;
    const pairCount=Object.values(a.pairs||{}).reduce((s,arr)=>s+(arr||[]).length,0);
    const phraseCount=(a.phrases||[]).length;
    table+=`<tr><td>${esc(a.name)}</td><td>${inputCount}</td><td>${pairCount}</td><td>${phraseCount}</td><td>${a.stats.spoken||0}</td><td>${a.stats.remix||0}</td><td>${a.stats.phrase||0}</td></tr>`;
  });
  table+='</table>';
  document.getElementById("agentStats").innerHTML=table;

  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,20);
  document.getElementById("phraseStats").innerHTML=
    '<table class="table"><tr><th>語録</th><th>回数</th><th>比率</th></tr>'+
    top.map(([p,c])=>`<tr><td>${esc(p)}</td><td>${c}</td><td>${total?(c/total*100).toFixed(1):0}%</td></tr>`).join("")+
    '</table>';
}

function syncSettings(){
  const s=state.settings;
  const map=[
    ["remixRate",Math.round(s.remixRate*100),"remixText",v=>v+"%"],
    ["recentLimit",s.recentLimit,"recentText",v=>v],
    ["plazaRecentLimit",s.plazaRecentLimit,"plazaRecentText",v=>v],
    ["echoPenalty",Math.round(s.echoPenalty*100),"echoText",v=>v+"%"],
    ["displayLimit",s.displayLimit||500,"displayLimitText",v=>v],
    ["conversationStrength",Math.round((s.conversationStrength||.72)*100),"conversationText",v=>v+"%"],
    ["minRelevance",Math.round((s.minRelevance||.22)*100),"relevanceText",v=>v+"%"],
    ["contextLimit",s.contextLimit||4,"contextText",v=>v],
    ["plazaLearnRate",Math.round((s.plazaLearnRate||.55)*100),"plazaLearnRateText",v=>v+"%"]
  ];
  map.forEach(([id,val,tid,fmt])=>{document.getElementById(id).value=val;document.getElementById(tid).textContent=fmt(val)});
  document.getElementById("plazaLearn").checked=s.plazaLearn;
  document.getElementById("avoidExact").checked=s.avoidExact;
  document.getElementById("blockChorus").checked=s.blockChorus;
  document.getElementById("showSource").checked=s.showSource;
  document.getElementById("humanTurnLearning").checked=s.humanTurnLearning;
  document.getElementById("plazaPhraseLearning").checked=s.plazaPhraseLearning!==false;
}

document.getElementById("addAgent").onclick=()=>{
  const name=norm(document.getElementById("newName").value);
  const rate=Number(document.getElementById("newRate").value)/100;
  if(!name)return;
  if(state.agents.some(a=>a.name===name)){alert("同名個体がいます。量産型にも限度があります。");return}

  const a=new Agent(name,rate,COLORS[state.agents.length%COLORS.length]);
  a.favWords=words(document.getElementById("newFav").value);

  let inherited={inputs:0,replies:0};
  if(document.getElementById("inheritDictionary").checked){
    const amount=Number(document.getElementById("inheritAmount").value)/100;
    inherited=inheritDictionaryTo(a,amount);
  }

  state.agents.push(a);
  const note=inherited.replies
    ? `${name} が広場に参加しました。既存辞書から ${inherited.inputs}入力・${inherited.replies}返答を継承しました。`
    : `${name} が空の辞書で広場に参加しました。`;
  state.plazaLog.push({who:"system",text:note});
  save();renderAll();
};

document.getElementById("personalSend").onclick=()=>{
  const i=Number(document.getElementById("personalAgent").value||0);
  const a=state.agents[i],el=document.getElementById("personalInput"),text=norm(el.value);
  if(!a||!text)return;

  // 今回の人間発言を、直前の人工無能発言への返答として覚える。
  if(state.settings.humanTurnLearning){
    for(let j=a.personalLog.length-1;j>=0;j--){
      const prev=a.personalLog[j];
      if(prev.who===a.name&&prev.text){
        if(isSafeLearningMessage(prev))a.learnPair(prev.text,text,"human");
        break;
      }
      if(prev.who==="あなた")break;
    }
  }

  a.learnPhrase(text,"human");
  const out=a.reply(text);
  a.personalLog.push({who:"あなた",text});

  if(out){
    a.personalLog.push({who:a.name,text:out.text,source:out.source});
    if(!isFallbackPollution(text)&&!isFallbackPollution(out.text)){
      a.learnPair(text,out.text,out.source==="remix"?"remix":"learned");
    }
  }else{
    a.personalLog.push({
      who:"system",
      text:"返答候補がありませんでした。入力内容は単語記憶に保存されました。"
    });
  }

  el.value="";save();renderAll();
};

function absorbPlazaUtterance(text,speakerName){
  text=norm(text);
  if(!state.settings.plazaPhraseLearning||!text||isFallbackPollution(text))return 0;

  let added=0;
  const base=Math.max(.1,Math.min(1,Number(state.settings.plazaLearnRate||.55)));

  state.agents.forEach(a=>{
    if(a.name===speakerName)return;

    const trait=Math.min(1.35,Math.max(.25,a.traitMultiplier(text)));
    const chance=Math.min(.98,base*trait);
    if(Math.random()>chance)return;

    const existed=(a.phrases||[]).some(p=>p.text===text);
    a.learnPhrase(text,"plaza");
    const p=(a.phrases||[]).find(x=>x.text===text);
    if(p&&p.kind!=="teach"&&p.kind!=="human")p.kind="plaza";
    if(!existed)added++;
  });

  return added;
}

function plazaPost(text,who="あなた"){
  text=norm(text);if(!text)return;
  state.turn++;
  state.plazaLog.push({who,text});
  pushPlazaRecent(text);
  absorbPlazaUtterance(text,who);
  let count=0,spokenThisTurn=new Set([text]);

  [...state.agents].sort(()=>Math.random()-.5).forEach(a=>{
    if(!a.shouldReply(text))return;
    let out=a.reply(text);
    if(!out)return;

    if(state.settings.blockChorus&&spokenThisTurn.has(out.text)){
      const alt=a.similarReply(text)||a.remix();
      if(alt&&!spokenThisTurn.has(alt.text))out=alt;
      else return;
    }

    spokenThisTurn.add(out.text);
    state.plazaLog.push({who:a.name,text:out.text,source:out.source});
    pushPlazaRecent(out.text);
    absorbPlazaUtterance(out.text,a.name);

    if(state.settings.plazaLearn&&out.source!=="context"&&!isFallbackPollution(text)&&!isFallbackPollution(out.text)){
      const echo=similarity(text,out.text);
      if(echo<.94){
        a.learnPair(text,out.text,out.source==="remix"?"remix":"learned");
      }
    }
    count++;
  });


  if(!count)state.plazaLog.push({who:"system",text:"……誰も反応しませんでした。"});
  save();renderAll();
}

document.getElementById("autoTalk").onclick=async()=>{
  autoStop=false;
  const rounds=Math.max(1,Math.min(50,Number(document.getElementById("rounds").value)||5));
  for(let r=0;r<rounds;r++){
    if(autoStop)break;
    state.turn++;
    const speaker=rand(state.agents);
    const corpus=uniq([
      ...Object.values(speaker.pairs).flat()
        .map(x=>speaker.normalizeCandidate(x))
        .filter(c=>c.kind!=="context"&&!isFallbackPollution(c.text))
        .map(c=>c.text),
      ...(speaker.phrases||[]).map(x=>x.text).filter(x=>!isFallbackPollution(x))
    ]);
    if(!corpus.length){
      state.plazaLog.push({who:"system",text:`${speaker.name} には発言候補がありません。`});
      save();renderAll();
      await new Promise(res=>setTimeout(res,120));
      continue;
    }
    let starter=rand(corpus);

    const fresh=corpus.filter(x=>!state.plazaRecent.includes(x));
    if(fresh.length)starter=rand(fresh);

    speaker.remember(starter);
    const starterPhrase=(speaker.phrases||[]).find(p=>p.text===starter);
    const starterSource=starterPhrase
      ?(starterPhrase.kind==="plaza"?"plazaPhrase":"phrase")
      :"learned";
    state.plazaLog.push({who:speaker.name,text:starter,source:starterSource});
    pushPlazaRecent(starter);
    absorbPlazaUtterance(starter,speaker.name);

    const spokenThisTurn=new Set([starter]);
    [...state.agents].filter(a=>a!==speaker).sort(()=>Math.random()-.5).forEach(a=>{
      if(!a.shouldReply(starter))return;
      let out=a.reply(starter);
      if(!out)return;

      if(state.settings.blockChorus&&spokenThisTurn.has(out.text)){
        const alt=a.similarReply(starter)||a.remix();
        if(alt&&!spokenThisTurn.has(alt.text))out=alt;
        else return;
      }

      spokenThisTurn.add(out.text);
      state.plazaLog.push({who:a.name,text:out.text,source:out.source});
      pushPlazaRecent(out.text);
      absorbPlazaUtterance(out.text,a.name);

      if(state.settings.plazaLearn&&out.source!=="context"&&!isFallbackPollution(starter)&&!isFallbackPollution(out.text)&&similarity(starter,out.text)<.94){
        a.learnPair(starter,out.text,out.source==="remix"?"remix":"learned");
      }
    });

    save();renderAll();
    await new Promise(res=>setTimeout(res,200));
  }
};
document.getElementById("stopAuto").onclick=()=>{autoStop=true};

document.getElementById("cleanFallback").onclick=()=>{
  if(!confirm("会話補完由来・補完変異らしい候補を辞書から強制削除しますか？"))return;

  let removedInputs=0,removedReplies=0,removedVocab=0,removedRecent=0;
  state.agents.forEach(a=>{
    const cleaned={};
    for(const [input,arr] of Object.entries(a.pairs||{})){
      if(isFallbackPollution(input)){
        removedInputs++;
        removedReplies+=(arr||[]).length;
        continue;
      }
      const next=(arr||[]).map(x=>a.normalizeCandidate(x)).filter(c=>{
        const bad=c.kind==="context"||isFallbackPollution(c.text);
        if(bad)removedReplies++;
        return !bad;
      });
      if(next.length)cleaned[input]=next;
      else removedInputs++;
    }
    a.pairs=cleaned;

    for(const word of Object.keys(a.vocab||{})){
      if(isFallbackPollution(word)){
        delete a.vocab[word];
        removedVocab++;
      }
    }

    const before=(a.recent||[]).length;
    a.recent=(a.recent||[]).filter(x=>!isFallbackPollution(x));
    removedRecent+=before-a.recent.length;
    a.dialogueContext=(a.dialogueContext||[]).filter(x=>
      !isFallbackPollution(x.input||"")&&!isFallbackPollution(x.reply||"")
    );
    a.fallbackRecent=[];
  });

  state.plazaRecent=(state.plazaRecent||[]).filter(x=>!isFallbackPollution(x));
  save();renderAll();
  alert(`強制削除しました。\n入力キー: ${removedInputs}件\n返答候補: ${removedReplies}件\n語彙: ${removedVocab}件\n直近履歴: ${removedRecent}件`);
};

document.getElementById("cleanEcho").onclick=()=>{
  let n=0;
  state.agents.forEach(a=>{
    for(const [input,arr] of Object.entries(a.pairs)){
      a.pairs[input]=arr.map(x=>a.normalizeCandidate(x)).map(c=>{
        if(similarity(input,c.text)>=.94){c.echoPenalty=.05;n++}
        return c;
      });
    }
  });
  save();renderAll();alert(`${n}件のオウム返し候補を弱体化しました。`);
};

document.getElementById("cleanDupes").onclick=()=>{
  let removed=0;
  state.agents.forEach(a=>{
    for(const [input,arr] of Object.entries(a.pairs)){
      const map=new Map();
      arr.map(x=>a.normalizeCandidate(x)).forEach(c=>{
        if(map.has(c.text)){
          const old=map.get(c.text);
          old.count=Math.min(12,(old.count||1)+(c.count||1));
          old.used=Math.min(old.used||0,c.used||0);
          if(c.kind==="teach")old.kind="teach";
          removed++;
        }else map.set(c.text,c);
      });
      a.pairs[input]=[...map.values()];
    }
  });
  save();renderAll();alert(`${removed}件の重複候補を統合しました。`);
};

document.getElementById("fileInput").onchange=async e=>{
  const file=e.target.files[0];if(!file)return;
  try{
    const x=JSON.parse(await file.text());
    state=x;
    state.version=VERSION;
    state.agents=(x.agents||[]).map(migrateAgent);
    state.settings=Object.assign(defaults().settings,x.settings||{});
    state.plazaLog=Array.isArray(x.plazaLog)?x.plazaLog:[];
    state.plazaRecent=Array.isArray(x.plazaRecent)?x.plazaRecent:
      state.plazaLog.filter(m=>m.who!=="system").slice(-18).map(m=>m.text);
    if(!state.agents.length)throw new Error();
    save();renderAll();alert("データを読み込みました。");
